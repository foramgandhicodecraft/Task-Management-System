<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/adminlogin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <link rel="shortcut icon" href="/static/IMAGES/login.png" type="image/x-icon">
  <title>Admin Login — TMS</title>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="sign-in-container">
        <form action="" method="POST">
          {% csrf_token %}
          <h2>Admin Login</h2>
          <p class="subtitle">Restricted area — authorized personnel only.</p>
          {% if messages %}
            {% for message in messages %}
            <div class="error-msg"><i class="fas fa-circle-exclamation" style="margin-right:6px;"></i>{{ message }}</div>
            {% endfor %}
          {% endif %}
          <input type="email" name="email" placeholder="Admin Email" autocomplete="username" required>
          <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
          <button type="submit"><i class="fas fa-shield-halved" style="margin-right:6px;"></i> Log In</button>
        </form>
      </div>
    </div>

    <div class="overlay-container">
      <div class="overlay">
        <div class="overlay-panel">
          <div class="brand-icon"><i class="fas fa-shield-halved"></i></div>
          <h2>Admin Portal</h2>
          <p>Only administrators can access this area. Please verify your credentials to continue.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
