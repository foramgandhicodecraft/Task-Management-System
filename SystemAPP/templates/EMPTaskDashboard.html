<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f5f3ff; color:#0f172a; min-height:100vh; padding:36px 24px; }
    .page-wrap { max-width:960px; margin:0 auto; }

    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
    .page-header-left h1 { font-size:22px; font-weight:700; color:#0f172a; }
    .page-header-left p { font-size:13.5px; color:#64748b; margin-top:3px; }
    .back-link { color:#64748b; text-decoration:none; font-size:13.5px; font-weight:500; display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:6px; border:1px solid #e2e8f0; background:#fff; transition:background .15s; }
    .back-link:hover { background:#f8fafc; }

    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; margin-bottom:32px; }

    .stat-card { background:#fff; border-radius:12px; border:1px solid #e2e8f0; padding:22px 24px; box-shadow:0 1px 3px rgba(0,0,0,.07); position:relative; overflow:hidden; transition:box-shadow .2s,transform .2s; }
    .stat-card:hover { box-shadow:0 6px 18px rgba(0,0,0,.1); transform:translateY(-2px); }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent,#7c3aed); }
    .stat-card.green::before { --accent:#10b981; }
    .stat-card.blue::before { --accent:#3b82f6; }
    .stat-card.orange::before { --accent:#f59e0b; }

    .stat-icon { width:44px; height:44px; border-radius:10px; background:var(--icon-bg,#ede9fe); display:flex; align-items:center; justify-content:center; color:var(--accent,#7c3aed); font-size:18px; margin-bottom:14px; }
    .stat-card.green .stat-icon { --icon-bg:#d1fae5; }
    .stat-card.blue .stat-icon { --icon-bg:#dbeafe; }
    .stat-card.orange .stat-icon { --icon-bg:#fef3c7; }

    .stat-value { font-size:32px; font-weight:700; color:#0f172a; line-height:1; margin-bottom:4px; }
    .stat-label { font-size:13px; color:#64748b; font-weight:500; }

    .progress-wrap { margin-top:10px; }
    .progress-bar { height:5px; background:#f1f5f9; border-radius:10px; overflow:hidden; margin-top:6px; }
    .progress-fill { height:100%; border-radius:10px; background:var(--accent,#7c3aed); transition:width .4s ease; }

    .section-title { font-size:15px; font-weight:700; color:#0f172a; margin-bottom:14px; }
    .quick-links { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
    .quick-link { background:#fff; border-radius:10px; border:1px solid #e2e8f0; padding:16px 18px; text-decoration:none; color:#0f172a; display:flex; align-items:center; gap:12px; font-size:13.5px; font-weight:600; transition:box-shadow .2s,background .15s; }
    .quick-link:hover { background:#faf5ff; box-shadow:0 4px 12px rgba(124,58,237,.12); }
    .quick-link i { font-size:16px; color:#7c3aed; width:20px; text-align:center; }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="page-header">
    <div class="page-header-left">
      <h1><i class="fas fa-chart-bar" style="color:#7c3aed;margin-right:10px;"></i>Task Dashboard</h1>
      <p>Welcome back, <strong>{{ employee.name }}</strong></p>
    </div>
    <a href="{% url 'EMPDashboard' %}" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
      <div class="stat-value">{{ total_tasks }}</div>
      <div class="stat-label">Total Tasks</div>
    </div>

    <div class="stat-card green">
      <div class="stat-icon"><i class="fas fa-circle-check"></i></div>
      <div class="stat-value">{{ completion_rate }}%</div>
      <div class="stat-label">Completion Rate</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:{{ completion_rate }}%;background:#10b981;"></div></div>
      </div>
    </div>

    <div class="stat-card orange">
      <div class="stat-icon"><i class="fas fa-bolt"></i></div>
      <div class="stat-value">{{ performance_rate }}%</div>
      <div class="stat-label">Performance Rate</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:{{ performance_rate }}%;background:#f59e0b;"></div></div>
      </div>
    </div>

    <div class="stat-card blue">
      <div class="stat-icon"><i class="fas fa-clock"></i></div>
      <div class="stat-value">{{ total_tasks }}</div>
      <div class="stat-label">Active Tasks</div>
    </div>
  </div>

  <div class="section-title">Quick Access</div>
  <div class="quick-links">
    <a href="{% url 'my_tasks' %}" class="quick-link"><i class="fas fa-clipboard-list"></i> My Tasks</a>
    <a href="{% url 'EMPTaskDes' %}" class="quick-link"><i class="fas fa-file-alt"></i> Task Details</a>
    <a href="{% url 'EMPTaskEndDate' %}" class="quick-link"><i class="fas fa-calendar-alt"></i> Deadlines</a>
    <a href="{% url 'EMPAccount' %}" class="quick-link"><i class="fas fa-comment-dots"></i> Raise Query</a>
  </div>
</div>

</body>
</html>
