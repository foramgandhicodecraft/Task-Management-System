<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Department</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f1f5f9; color:#0f172a; min-height:100vh; padding:40px 20px; }
    .page-wrap { max-width:700px; margin:0 auto; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .page-header h1 { font-size:22px; font-weight:700; color:#0f172a; }
    .back-link { color:#64748b; text-decoration:none; font-size:13.5px; font-weight:500; display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:6px; border:1px solid #e2e8f0; background:#fff; transition:background .15s; }
    .back-link:hover { background:#f8fafc; }
    .card { background:#fff; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06); border:1px solid #e2e8f0; padding:32px 36px; }
    .form-group { margin-bottom:20px; }
    .form-group label,.form-group th { display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:7px; }
    .form-group input,.form-group select,.form-group textarea,
    input[type="text"],input[type="email"],textarea,select {
      width:100%; padding:10px 13px; border:1px solid #e2e8f0; border-radius:7px;
      font-size:14px; color:#0f172a; background:#fff; font-family:'Inter',sans-serif;
      transition:border-color .15s,box-shadow .15s; outline:none;
    }
    input[type="text"]:focus,input[type="email"]:focus,textarea:focus,select:focus,
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus {
      border-color:#4f46e5; box-shadow:0 0 0 3px rgba(79,70,229,.1);
    }
    textarea { resize:vertical; min-height:100px; }
    /* Django form widget overrides */
    ul.errorlist { color:#ef4444; font-size:12px; margin:4px 0 0; padding:0; list-style:none; }
    p { margin-bottom:20px; }
    p label { display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:7px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 28px; }
    .form-actions { display:flex; justify-content:flex-end; gap:12px; margin-top:28px; padding-top:22px; border-top:1px solid #f1f5f9; }
    .btn-primary { padding:10px 24px; background:#4f46e5; color:#fff; border:none; border-radius:7px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:background .15s,transform .1s; display:inline-flex; align-items:center; gap:6px; }
    .btn-primary:hover { background:#3730a3; }
    .btn-secondary { padding:10px 20px; background:transparent; color:#64748b; border:1px solid #e2e8f0; border-radius:7px; font-size:14px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; transition:background .15s; }
    .btn-secondary:hover { background:#f8fafc; }
    @media(max-width:600px){ .form-grid{grid-template-columns:1fr;} .card{padding:24px 20px;} }
  </style>
</head>
<body>

{% if messages %}
  <script>
    {% for message in messages %}
      alert("{{ message }}");
    {% endfor %}
  </script>
{% endif %}

<div class="page-wrap">
  <div class="page-header">
    <h1><i class="fas fa-building" style="color:#4f46e5;margin-right:10px;"></i>Add Department</h1>
    <a href="{% url 'AdminDashboard' %}" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
  </div>

  <div class="card">
    <form action="" method="POST" id="departmentForm">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>{{ form.name.label }}</label>
          {{ form.name }}
          {{ form.name.errors }}
        </div>
        <div class="form-group">
          <label>{{ form.code.label }}</label>
          {{ form.code }}
          {{ form.code.errors }}
        </div>
        <div class="form-group">
          <label>{{ form.head.label }}</label>
          {{ form.head }}
          {{ form.head.errors }}
        </div>
        <div class="form-group">
          <label>{{ form.location.label }}</label>
          {{ form.location }}
          {{ form.location.errors }}
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>{{ form.description.label }}</label>
          {{ form.description }}
          {{ form.description.errors }}
        </div>
      </div>
      <div class="form-actions">
        <button type="button" onclick="document.getElementById('departmentForm').reset();" class="btn-secondary">
          <i class="fas fa-undo"></i> Reset
        </button>
        <button type="submit" class="btn-primary">
          <i class="fas fa-building"></i> Add Department
        </button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
