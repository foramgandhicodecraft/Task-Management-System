<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Descriptions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f5f3ff; color:#0f172a; min-height:100vh; padding:36px 24px; }
    .page-wrap { max-width:780px; margin:0 auto; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .page-header h1 { font-size:22px; font-weight:700; }
    .back-link { color:#64748b; text-decoration:none; font-size:13.5px; font-weight:500; display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:6px; border:1px solid #e2e8f0; background:#fff; transition:background .15s; }
    .back-link:hover { background:#f8fafc; }
    .summary-chip { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; background:#ede9fe; color:#5b21b6; border-radius:20px; font-size:13px; font-weight:600; margin-bottom:24px; }
    .task-card { background:#fff; border-radius:10px; border:1px solid #e2e8f0; padding:20px 22px; box-shadow:0 1px 3px rgba(0,0,0,.07); margin-bottom:14px; transition:box-shadow .2s,transform .2s; }
    .task-card:hover { box-shadow:0 4px 14px rgba(0,0,0,.1); transform:translateY(-1px); }
    .task-card h3 { font-size:15px; font-weight:700; color:#0f172a; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
    .task-card h3 i { color:#7c3aed; font-size:13px; }
    .desc-text { font-size:13.5px; color:#475569; line-height:1.6; padding:10px 14px; background:#f8fafc; border-radius:6px; border-left:3px solid #7c3aed; margin-bottom:12px; }
    .task-footer { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
    .badge-deadline { background:#fef3c7; color:#92400e; }
    .badge-status-Pending { background:#fef9c3; color:#713f12; }
    .badge-status-In-Progress { background:#dbeafe; color:#1e40af; }
    .badge-status-Completed { background:#dcfce7; color:#14532d; }
    .empty-state { text-align:center; padding:60px 20px; color:#94a3b8; background:#fff; border-radius:12px; border:1px solid #e2e8f0; }
    .empty-state i { font-size:40px; margin-bottom:12px; display:block; color:#e2e8f0; }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="page-header">
    <h1><i class="fas fa-file-alt" style="color:#7c3aed;margin-right:10px;"></i>Task Descriptions</h1>
    <a href="{% url 'EMPDashboard' %}" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
  </div>

  {% if tasks %}
  <div class="summary-chip"><i class="fas fa-layer-group"></i> {{ tasks|length }} task{{ tasks|length|pluralize }} assigned</div>
    {% for task in tasks %}
    <div class="task-card">
      <h3><i class="fas fa-circle-dot"></i>{{ task.title }}</h3>
      <div class="desc-text">{{ task.description }}</div>
      <div class="task-footer">
        <span class="badge badge-deadline"><i class="fas fa-calendar-alt"></i> Due: {{ task.due_date }}</span>
        <span class="badge badge-status-{{ task.status|cut:' ' }}"><i class="fas fa-tag"></i> {{ task.status }}</span>
      </div>
    </div>
    {% endfor %}
  {% else %}
  <div class="empty-state">
    <i class="fas fa-inbox"></i>
    <p>No tasks assigned to you yet.</p>
  </div>
  {% endif %}
</div>

</body>
</html>
