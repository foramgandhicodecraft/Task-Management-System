<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f1f5f9; color:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px 20px; }
    .page-wrap { width:100%; max-width:480px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .page-header h1 { font-size:22px; font-weight:700; }
    .back-link { color:#64748b; text-decoration:none; font-size:13.5px; font-weight:500; display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:6px; border:1px solid #e2e8f0; background:#fff; transition:background .15s; }
    .back-link:hover { background:#f8fafc; }
    .alert { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13.5px; font-weight:500; }
    .alert-success { background:#dcfce7; color:#14532d; border:1px solid #bbf7d0; }
    .alert-error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
    .card { background:#fff; border-radius:12px; box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06); border:1px solid #e2e8f0; padding:32px 36px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:7px; }
    .form-group input { width:100%; padding:10px 13px; border:1px solid #e2e8f0; border-radius:7px; font-size:14px; color:#0f172a; background:#fff; font-family:'Inter',sans-serif; outline:none; transition:border-color .15s,box-shadow .15s; }
    .form-group input:focus { border-color:#4f46e5; box-shadow:0 0 0 3px rgba(79,70,229,.1); }
    .form-group input:disabled { background:#f8fafc; color:#94a3b8; cursor:not-allowed; }
    .btn-primary { width:100%; padding:11px 20px; background:#4f46e5; color:#fff; border:none; border-radius:7px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:background .15s,transform .1s; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px; }
    .btn-primary:hover { background:#3730a3; }
    .btn-primary:active { transform:scale(.99); }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <h1><i class="fas fa-gear" style="color:#4f46e5;margin-right:10px;"></i>Admin Settings</h1>
    <a href="{% url 'AdminDashboard' %}" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
  </div>

  {% if messages %}
    {% for message in messages %}
    <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
      <i class="fas {% if message.tags == 'error' %}fa-circle-xmark{% else %}fa-circle-check{% endif %}"></i>
      {{ message }}
    </div>
    {% endfor %}
  {% endif %}

  <div class="card">
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Admin ID</label>
        <input type="text" value="{{ admin.admin_id }}" disabled>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" required placeholder="Enter new password">
      </div>
      <button type="submit" class="btn-primary"><i class="fas fa-lock"></i> Update Password</button>
    </form>
  </div>
</div>
</body>
</html>
