<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/css/login.css" />
    <link rel="stylesheet" href="/static/css/home.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
     <link
      rel="shortcut icon"
      href="/static/IMAGES/login.png"
      type="image/x-icon"
    />
    <title>Login Form</title>
  </head>
  <body>
    <div class="container" id="container">

      <div class="form-container sign-in-container">
        <!-- Sign In Form -->
        <form  method="POST">
         {% csrf_token %}
          <h1>Sign in</h1>
          <span>or use your account</span>
          <input type="email" placeholder="Email" name="LOGINEmail" />
          <input type="password" placeholder="Password" name="LOGINPassword" />
          <button type="submit">Sign In</button>
      </form>
      </div>
      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-right">
            <h2>Welcome to Task Manager</h2>
            <p>Login with the credentials provided by your Administrator</p>
          </div>
        </div>
      </div>
    </div>


    <script>
      // The toggle logic has been removed as signup is no longer available.
    </script>
  </body>
</html>
