<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <link rel="shortcut icon" href="/static/IMAGES/login.png" type="image/x-icon">
  <title>Employee Login — TMS</title>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="sign-in-container">
        <form method="POST">
          {% csrf_token %}
          <h1>Sign In</h1>
          <span>Use the credentials provided by your administrator</span>
          {% if messages %}
            {% for message in messages %}
            <div class="error-msg"><i class="fas fa-circle-exclamation" style="margin-right:6px;"></i>{{ message }}</div>
            {% endfor %}
          {% endif %}
          <input type="email" placeholder="Email address" name="LOGINEmail" autocomplete="username" required>
          <input type="password" placeholder="Password" name="LOGINPassword" autocomplete="current-password" required>
          <button type="submit"><i class="fas fa-arrow-right-to-bracket" style="margin-right:6px;"></i> Sign In</button>
        </form>
      </div>
    </div>

    <div class="overlay-container">
      <div class="overlay">
        <div class="overlay-panel">
          <div class="brand-icon"><i class="fas fa-list-check"></i></div>
          <h2>Welcome Back</h2>
          <p>Login with the credentials provided by your Administrator to access your tasks.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
