<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Employee</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f1f5f9; color:#0f172a; min-height:100vh; padding:40px 20px; }
    .page-wrap { max-width:900px; margin:0 auto; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .page-header h1 { font-size:22px; font-weight:700; color:#0f172a; }
    .back-link { color:#64748b; text-decoration:none; font-size:13.5px; font-weight:500; display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:6px; border:1px solid #e2e8f0; background:#fff; transition:background .15s,border-color .15s; }
    .back-link:hover { background:#f8fafc; border-color:#cbd5e1; color:#374151; }
    .card { background:#fff; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06); border:1px solid #e2e8f0; padding:32px 36px; }
    .section-title { font-size:13px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.07em; margin:0 0 20px; padding-bottom:12px; border-bottom:1px solid #f1f5f9; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 28px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:7px; }
    .form-group input,.form-group select,.form-group textarea {
      width:100%; padding:10px 13px; border:1px solid #e2e8f0; border-radius:7px;
      font-size:14px; color:#0f172a; background:#fff; font-family:'Inter',sans-serif;
      transition:border-color .15s,box-shadow .15s; outline:none;
    }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus {
      border-color:#4f46e5; box-shadow:0 0 0 3px rgba(79,70,229,.1);
    }
    .form-group textarea { resize:vertical; min-height:80px; }
    .form-group input[type="file"] { padding:8px 13px; background:#f8fafc; cursor:pointer; }
    .full-width { grid-column:1 / -1; }
    .form-actions { display:flex; justify-content:flex-end; gap:12px; margin-top:28px; padding-top:22px; border-top:1px solid #f1f5f9; }
    .btn-primary { padding:10px 24px; background:#4f46e5; color:#fff; border:none; border-radius:7px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:background .15s,transform .1s; display:inline-flex; align-items:center; gap:6px; }
    .btn-primary:hover { background:#3730a3; }
    .btn-primary:active { transform:scale(.98); }
    .btn-secondary { padding:10px 20px; background:transparent; color:#64748b; border:1px solid #e2e8f0; border-radius:7px; font-size:14px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; transition:background .15s; }
    .btn-secondary:hover { background:#f8fafc; }
    @media(max-width:640px){ .form-grid{grid-template-columns:1fr;} .card{padding:24px 20px;} .full-width{grid-column:auto;} }
  </style>
</head>
<body>

{% if messages %}
  <script>
    {% for message in messages %}
      alert("{{ message }}");
    {% endfor %}
  </script>
{% endif %}

<div class="page-wrap">
  <div class="page-header">
    <h1><i class="fas fa-user-plus" style="color:#4f46e5;margin-right:10px;"></i>Add New Employee</h1>
    <a href="{% url 'AdminDashboard' %}" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
  </div>

  <div class="card">
    <form action="" method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <p class="section-title">Personal Information</p>
      <div class="form-grid">
        <div class="form-group">
          <label for="fname">Full Name *</label>
          <input type="text" id="fname" name="firstname" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="id">Employee ID *</label>
          <input type="text" id="id" name="id" placeholder="EMP001" required>
        </div>
        <div class="form-group">
          <label for="dob">Date of Birth *</label>
          <input type="date" id="dob" name="dob" required>
        </div>
        <div class="form-group">
          <label for="doj">Date of Joining *</label>
          <input type="date" id="doj" name="doj" required>
        </div>
        <div class="form-group full-width">
          <label for="address">Address *</label>
          <input type="text" id="address" name="address" placeholder="123 Main St, City" required>
        </div>
        <div class="form-group">
          <label for="number">Contact Number *</label>
          <input type="text" id="number" name="number" placeholder="+91 98765 43210" required>
        </div>
        <div class="form-group">
          <label for="pictureInput">Profile Picture</label>
          <input type="file" id="pictureInput" name="pictureInput" accept="image/*">
        </div>
      </div>

      <p class="section-title" style="margin-top:12px;">Work Details</p>
      <div class="form-grid">
        <div class="form-group">
          <label for="dname">Department *</label>
          <select id="dname" name="department">
            {% for department in departments %}
              <option value="{{ department.name }}">{{ department.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label for="des">Designation</label>
          <input type="text" id="des" name="des" placeholder="Senior Developer">
        </div>
        <div class="form-group">
          <label for="dest">Destination</label>
          <input type="text" id="dest" name="dest" placeholder="Remote / On-site">
        </div>
        <div class="form-group full-width">
          <label for="desc">Description</label>
          <textarea id="desc" name="desc" placeholder="Brief description or notes..."></textarea>
        </div>
      </div>

      <p class="section-title" style="margin-top:12px;">Account Credentials</p>
      <div class="form-grid">
        <div class="form-group">
          <label for="email">Primary Email *</label>
          <input type="email" id="email" name="email" placeholder="john.doe@company.com" required>
        </div>
        <div class="form-group">
          <label for="newemail">Login Email *</label>
          <input type="email" id="newemail" name="newemail" placeholder="john.doe@personal.com" required>
        </div>
        <div class="form-group">
          <label for="pass">Password *</label>
          <input type="password" id="pass" name="pass" placeholder="Set a strong password" required>
        </div>
      </div>

      <div class="form-actions">
        <button type="reset" class="btn-secondary"><i class="fas fa-undo"></i> Reset</button>
        <button type="submit" class="btn-primary"><i class="fas fa-user-plus"></i> Add Employee</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
