<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Deadlines</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f5f3ff; color:#0f172a; min-height:100vh; padding:36px 24px; }
    .page-wrap { max-width:720px; margin:0 auto; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .page-header h1 { font-size:22px; font-weight:700; }
    .back-link { color:#64748b; text-decoration:none; font-size:13.5px; font-weight:500; display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:6px; border:1px solid #e2e8f0; background:#fff; transition:background .15s; }
    .back-link:hover { background:#f8fafc; }
    .task-card { background:#fff; border-radius:10px; border:1px solid #e2e8f0; padding:18px 22px; box-shadow:0 1px 3px rgba(0,0,0,.07); margin-bottom:14px; display:flex; align-items:center; gap:16px; transition:box-shadow .2s,transform .2s; }
    .task-card:hover { box-shadow:0 4px 14px rgba(0,0,0,.1); transform:translateY(-1px); }
    .task-icon-wrap { width:42px; height:42px; border-radius:10px; background:#ede9fe; display:flex; align-items:center; justify-content:center; color:#7c3aed; font-size:17px; flex-shrink:0; }
    .task-body { flex:1; min-width:0; }
    .task-body h3 { font-size:15px; font-weight:700; color:#0f172a; margin-bottom:5px; }
    .deadline-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; background:#fef3c7; color:#92400e; border-radius:20px; font-size:12px; font-weight:600; }
    .empty-state { text-align:center; padding:60px 20px; color:#94a3b8; background:#fff; border-radius:12px; border:1px solid #e2e8f0; }
    .empty-state i { font-size:40px; margin-bottom:12px; display:block; color:#e2e8f0; }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="page-header">
    <h1><i class="fas fa-calendar-check" style="color:#7c3aed;margin-right:10px;"></i>Task Deadlines</h1>
    <a href="{% url 'EMPDashboard' %}" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
  </div>

  {% if tasks %}
    {% for task in tasks %}
    <div class="task-card">
      <div class="task-icon-wrap"><i class="fas fa-tasks"></i></div>
      <div class="task-body">
        <h3>{{ task.title }}</h3>
        <span class="deadline-badge"><i class="fas fa-clock"></i> Due: {{ task.due_date }}{% if task.deadline_time %} at {{ task.deadline_time }}{% endif %}</span>
      </div>
    </div>
    {% endfor %}
  {% else %}
  <div class="empty-state">
    <i class="fas fa-calendar-check"></i>
    <p>No upcoming deadlines.</p>
  </div>
  {% endif %}
</div>

</body>
</html>
