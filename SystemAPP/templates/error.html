<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — TMS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f1f5f9; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .error-card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.08); border:1px solid #e2e8f0; padding:48px 40px; max-width:460px; width:100%; text-align:center; }
    .error-icon { width:72px; height:72px; border-radius:50%; background:#fee2e2; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
    .error-icon i { font-size:32px; color:#ef4444; }
    h1 { font-size:22px; font-weight:700; color:#0f172a; margin-bottom:12px; }
    p { font-size:14px; color:#64748b; line-height:1.6; margin-bottom:28px; }
    .btn-home { display:inline-flex; align-items:center; gap:8px; padding:11px 28px; background:#4f46e5; color:#fff; border-radius:8px; text-decoration:none; font-size:14px; font-weight:600; transition:background .15s,transform .1s; }
    .btn-home:hover { background:#3730a3; transform:translateY(-1px); }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon"><i class="fas fa-triangle-exclamation"></i></div>
    <h1>Something Went Wrong</h1>
    <p>{{ error_message }}</p>
    <a href="{% url 'HOME' %}" class="btn-home"><i class="fas fa-house"></i> Go to Home</a>
  </div>
</body>
</html>
